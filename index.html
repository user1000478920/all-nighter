    <style type="text/css">
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn&display=swap');
    * {
    font-family: 'Vazirmatn', sans-serif !important;
    }   /* discord ahh font*/
    body { 
     background: #121212;
    }
    .collage-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px; /* space between images */
    width: 90%;
    max-width: 1200px; /* prevent image from stretching too much on very large screens */
    margin: auto;
    }
    @media screen and (max-width:400px){
    .image-wrapper {
    height: 100%;
    overflow: hidden;
    }
    #note{
    display: none;
    }
    }
    @media screen and (min-width:400px){
    .image-wrapper {
    aspect-ratio: 3/2;
    overflow: hidden;
    }
    }

    .image-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* tell image to cover the entire container while maintaining its aspect ratio, cropping the excess if needed */
        display: block;
        object-position: 30% 0;
    }
    p{
    color: #666666;
    display: flex;
    justify-content: center;
    align-items: center;
    }
    u{
    color: #676767; /* 67 */
    }
    a{
    text-decoration: none;
    }
    </style>
